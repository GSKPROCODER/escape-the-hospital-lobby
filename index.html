<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#05070a" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='18' fill='%230b1418'/%3E%3Crect x='44' y='24' width='12' height='52' fill='%2335e0c8'/%3E%3Crect x='24' y='44' width='52' height='12' fill='%2335e0c8'/%3E%3C/svg%3E" />
    <title>Escape the Hospital Lobby</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <!-- WebGL Canvas Container -->
    <div id="game-container"></div>

    <!-- Atmospheric post overlays (pure CSS) -->
    <div id="fx-vignette" class="fx-layer"></div>
    <div id="fx-danger" class="fx-layer"></div>
    <div id="fx-grain" class="fx-layer"></div>
    <div id="fx-scanlines" class="fx-layer"></div>

    <!-- UI Overlay Layer (screens injected by TypeScript) -->
    <div id="ui-layer"></div>

    <!-- Transient toasts (checkpoints, pickups) -->
    <div id="toast-layer"></div>

    <!-- Death / damage full-screen fade (above everything, brief) -->
    <div id="fx-fade"></div>

    <!-- Boot / loading screen (removed once the game is ready) -->
    <div id="boot-screen">
      <div class="boot-inner">
        <div class="boot-title">ESCAPE THE HOSPITAL</div>
        <div class="boot-spinner"></div>
        <div class="boot-status" id="boot-status">Waking up&hellip;</div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
